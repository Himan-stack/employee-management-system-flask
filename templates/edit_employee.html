<!DOCTYPE html>
<html>

<head>

<title>Edit Employee</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>Edit Employee</h2>

<form method="POST">

<input
type="text"
name="name"
value="{{ employee.name }}"
required>

<input
type="email"
name="email"
value="{{ employee.email }}"
required>

<input
type="text"
name="phone"
value="{{ employee.phone }}"
required>

<input
type="number"
name="age"
value="{{ employee.age }}"
required>

<h4>Gender</h4>

<label>
<input type="radio"
name="gender"
value="Male"
{% if employee.gender=="Male" %}checked{% endif %}>
Male
</label>

<label>
<input type="radio"
name="gender"
value="Female"
{% if employee.gender=="Female" %}checked{% endif %}>
Female
</label>

<label>
<input type="radio"
name="gender"
value="Other"
{% if employee.gender=="Other" %}checked{% endif %}>
Other
</label>

<br><br>

<select name="education">

<option {% if employee.education=="Bachelors" %}selected{% endif %}>Bachelors</option>

<option {% if employee.education=="Masters" %}selected{% endif %}>Masters</option>

<option {% if employee.education=="PHD" %}selected{% endif %}>PHD</option>

</select>

<input
type="text"
name="city"
value="{{ employee.city }}"
required>

<textarea
name="address">{{ employee.address }}</textarea>

<select name="department">

{% for dept in departments %}

<option
value="{{ dept.department_id }}"
{% if dept.department_id==employee.department_id %}selected{% endif %}>

{{ dept.department_name }}

</option>

{% endfor %}

</select>

<select name="payment_tier">

<option value="1"
{% if employee.payment_tier==1 %}selected{% endif %}>Tier 1</option>

<option value="2"
{% if employee.payment_tier==2 %}selected{% endif %}>Tier 2</option>

<option value="3"
{% if employee.payment_tier==3 %}selected{% endif %}>Tier 3</option>

</select>

<h4>Projects</h4>

{% for project in projects %}

<label>

<input
type="checkbox"
name="projects"
value="{{ project.project_id }}"
{% if project.project_id in employee_projects %}checked{% endif %}>

{{ project.project_name }}

</label>

<br>

{% endfor %}

<br>

<button>

Update Employee

</button>

</form>

<br>

<a href="{{ url_for('employees') }}">

<button>

Back

</button>

</a>

</div>

</body>

</html>
