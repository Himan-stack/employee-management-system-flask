<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>Employee Management System</h2>

<h3>Admin Login</h3>

{% if error %}

<p class="error">{{ error }}</p>

{% endif %}

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
