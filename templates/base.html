<!DOCTYPE html>
<html lang="en" data-theme-init>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1226">
  <title>{% block title %}Employee Management{% endblock %} · 50 Hertz HR</title>

  <!-- Preconnect + fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Design system -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}">

  <!-- Theme (loaded early to prevent FOUC) -->
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

  {% block head_extra %}{% endblock %}
</head>
<body>

{% block body %}
    {% block content %}{% endblock %}
{% endblock %}

{% include "components/flash.html" %}

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}

</body>
</html>
